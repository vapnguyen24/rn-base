# ─── Test CI ────────────────────────────────────────────────────────────────
# Runs on every push and PR:
#   Job 1 — unit + component tests (Jest + RTL + MSW)     ← fast, Linux
#   Job 2 — iOS E2E tests (Detox)                          ← slow, macOS
#   Job 3 — Android E2E tests (Detox)                      ← slow, Linux + emulator
#
# Caching strategy:
#   - node_modules is cached by package-lock.json hash
#   - Gradle cache is preserved between Android runs
#   - CocoaPods is cached between iOS runs
#
# Requirements:
#   - Repository secret CODECOV_TOKEN (optional, for coverage upload)

name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true   # Cancel superseded runs on the same branch

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Unit & Component ──────────────────────────────────────────────────
  unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc          # Pin Node version via .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:ci
        env:
          CI: true
          API_BASE_URL: https://api.example.com

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ── Job 2: iOS E2E ────────────────────────────────────────────────────────────
  e2e-ios:
    name: iOS E2E Tests
    runs-on: macos-15            # Xcode 16.x required by React Native >= 0.76
    timeout-minutes: 60
    needs: unit                  # Only run E2E if unit tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache CocoaPods
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install applesimutils
        run: brew tap wix/brew && brew install applesimutils

      - name: Install Pods
        run: cd ios && pod install --repo-update

      - name: Cache Detox build
        uses: actions/cache@v4
        with:
          path: ios/build
          key: detox-ios-build-${{ hashFiles('ios/**') }}-${{ hashFiles('src/**') }}
          restore-keys: detox-ios-build-

      - name: Build for Detox (Release — faster tests)
        run: npx detox build --configuration ios.sim.release

      - name: Run Detox E2E
        run: npx detox test --configuration ios.sim.release --cleanup --headless
        env:
          CI: true

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-ios
          path: .artifacts/e2e
          retention-days: 7

  # ── Job 3: Android E2E ────────────────────────────────────────────────────────
  e2e-android:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build for Detox (Release)
        run: npx detox build --configuration android.emu.release

      - name: Enable KVM (hardware acceleration for AVD)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android E2E with AVD
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: npx detox test --configuration android.emu.release --cleanup
        env:
          CI: true

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-android
          path: .artifacts/e2e
          retention-days: 7
