# ─── Test CI (Optimized) ─────────────────────────────────────────────────────
# Job 1 — Unit + Component tests (Jest + RTL + MSW)     ← fast, Linux
# Job 2 — iOS E2E tests (Detox)                          ← chỉ chạy khi PR → main
# Job 3 — Android E2E tests (Detox)                      ← chỉ chạy khi PR → main
#
name: Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'ios/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'ios/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Unit & Component ──────────────────────────────────────────────────
  unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:ci
        env:
          CI: true
          API_BASE_URL: https://api.example.com

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ── Job 2: iOS E2E ────────────────────────────────────────────────────────────
  e2e-ios:
    name: iOS E2E Tests
    runs-on: macos-15
    timeout-minutes: 60
    needs: unit
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install applesimutils
        run: brew tap wix/brew && brew install applesimutils

      # Bỏ --repo-update: tiết kiệm 2-3 phút
      - name: Install Pods
        run: cd ios && pod install

      # Cache key gọn hơn → cache hit tốt hơn
      - name: Cache Detox build
        uses: actions/cache@v4
        with:
          path: ios/build
          key: detox-ios-build-${{ hashFiles('ios/Podfile.lock', 'package-lock.json') }}
          restore-keys: detox-ios-build-

      - name: Build for Detox (Release)
        run: npx detox build --configuration ios.sim.release

      - name: Run Detox E2E
        run: npx detox test --configuration ios.sim.release --cleanup --headless
        env:
          CI: true

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-ios
          path: .artifacts/e2e
          retention-days: 7

  # ── Job 3: Android E2E ────────────────────────────────────────────────────────
  e2e-android:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: unit
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # Enable KVM trước khi build → AVD boot nhanh hơn
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build for Detox (Release)
        run: npx detox build --configuration android.emu.release

      - name: Run Android E2E with AVD
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Medium_Phone
          script: npx detox test --configuration android.emu.release --cleanup
        env:
          CI: true

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-android
          path: .artifacts/e2e
          retention-days: 7
